<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabe Cohen - Record Collection</title>
    <style>
        @font-face {
            font-family: 'BattleNet';
            src: url('assets/battlenet.ttf') format('truetype');
        }
        @font-face {
            font-family: "Born2bSportyV2";
            src: url("assets/Born2bSportyV2.ttf") format("truetype");
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a12;
            color: white;
            font-family: BattleNet, monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0; left: 0;
        }

        canvas { display: block; }

        /* CRT scanline overlay */
        #scanlines {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.12) 0px,
                rgba(0,0,0,0.12) 1px,
                transparent 1px,
                transparent 3px
            );
        }

        /* Top HUD */
        #hud {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 10;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(10,10,18,0.95) 0%, transparent 100%);
            pointer-events: none;
        }
        #hud * { pointer-events: auto; }
        #hud h1 {
            font-family: Born2bSportyV2, monospace;
            font-size: 1.6em;
            letter-spacing: 3px;
            color: #e0d8cc;
            text-shadow: 0 0 8px rgba(255,200,150,0.3);
        }
        #hud a {
            color: #00ffcc;
            font-size: 0.9em;
            text-decoration: none;
            border: 1px solid #00ffcc44;
            padding: 4px 12px;
            border-radius: 2px;
            transition: all 0.2s;
        }
        #hud a:hover { background: #00ffcc22; border-color: #00ffcc; }

        /* Loading */
        #loading {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0a0a12;
            z-index: 100;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.6s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        #loading h2 {
            font-family: Born2bSportyV2, monospace;
            font-size: 2em; letter-spacing: 4px;
            color: #ff00ff; margin-bottom: 20px;
        }
        .loader { width: 200px; height: 4px; background: #1a1a2e; border-radius: 2px; overflow: hidden; }
        .loader-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ff00ff, #00ffff); transition: width 0.3s; }
        #load-status { margin-top: 10px; font-size: 0.8em; color: #666; }

        /* Detail info overlay (shown over 3D scene when album is focused) */
        #detail-info {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 50;
            padding: 20px 24px;
            background: linear-gradient(0deg, rgba(5,5,15,0.92) 0%, rgba(5,5,15,0.7) 70%, transparent 100%);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
        }
        #detail-info.active {
            transform: translateY(0);
            pointer-events: auto;
        }
        #detail-info-inner {
            max-width: 600px;
            margin: 0 auto;
        }
        #detail-title {
            font-family: Born2bSportyV2, monospace;
            font-size: 1.5em;
            color: #fff; letter-spacing: 1px;
        }
        #detail-artist { font-size: 1em; color: #00ffcc; margin-top: 4px; }
        #detail-embed-wrap { margin-top: 10px; border-radius: 2px; overflow: hidden; }
        #detail-embed-wrap iframe { border: 0; width: 100%; height: 120px; }
        #detail-actions { margin-top: 10px; display: flex; gap: 12px; align-items: center; }
        #detail-link {
            color: #ff00ff; font-size: 0.85em;
            text-decoration: none;
            border: 1px solid #ff00ff44;
            padding: 6px 14px; border-radius: 2px;
            transition: all 0.2s;
        }
        #detail-link:hover { background: #ff00ff22; border-color: #ff00ff; }
        #detail-back {
            background: none; border: 1px solid #ffffff33;
            color: #aaa; font-size: 0.85em; font-family: BattleNet, monospace;
            padding: 6px 14px; border-radius: 2px;
            cursor: pointer; transition: all 0.2s;
        }
        #detail-back:hover { border-color: #fff; color: #fff; }

        /* Bottom bar */
        #info-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            z-index: 10; padding: 10px 20px;
            background: linear-gradient(0deg, rgba(10,10,18,0.95) 0%, transparent 100%);
            font-size: 0.75em; color: #555; text-align: center;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #info-bar.hidden { opacity: 0; }
        #album-count { color: #00ffcc88; }

        /* Tooltip */
        #tooltip {
            position: fixed; z-index: 20;
            padding: 6px 12px;
            background: rgba(15,10,30,0.92);
            border: 1px solid #ff00ff55;
            border-radius: 2px; font-size: 0.85em;
            pointer-events: none; display: none;
            max-width: 280px;
            box-shadow: 0 0 12px #ff00ff22;
        }
        #tooltip .tt-title { color: #fff; font-family: Born2bSportyV2, monospace; letter-spacing: 1px; }
        #tooltip .tt-artist { color: #00ffcc; font-size: 0.9em; margin-top: 2px; }

        @media (max-width: 600px) {
            #hud h1 { font-size: 1.1em; }
            #detail-title { font-size: 1.1em; }
        }
    </style>
</head>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",

<script type="module">
import * as THREE from 'three';

// ── Config ──────────────────────────────────────────────────────
const BANDCAMP_USER = 'archonic7';
const ALBUMS_PER_ROW = 6;
const ALBUM_SIZE = 1.5;
const ALBUM_GAP = 0.25;
const SHELF_DEPTH = 1.2;
const ROW_HEIGHT = 2.2;
const SPINE_WIDTH = 0.10;
const LEAN_ANGLE = 0.18; // radians - how much records lean back
const HOVER_PULL = 0.35; // slight pull on hover
const FULL_PULL = 2.5;   // full pull-out on click (brings to camera)

// CORS proxies to try in order (for GET requests)
const PROXIES = [
    url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

// ── State ───────────────────────────────────────────────────────
let albums = [];
let totalCount = 0;
let fanId = null;
let lastToken = null;
let albumMeshes = [];
let hoveredMesh = null;
let selectedMesh = null;
let selectedAlbum = null;
let scrollOffset = 0;
let targetScroll = 0;
let isDragging = false;
let lastPointerY = 0;
let pointerDownTime = 0;
let pointerMoved = false;

// Camera animation state
const cameraDefaults = { x: 0, y: 1.8, z: 7, lookY: 1.5 };
let cameraTarget = { ...cameraDefaults };
let isDetailView = false;

// ── DOM refs ────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const loadingEl = document.getElementById('loading');
const loaderBar = document.getElementById('loader-bar');
const loadStatus = document.getElementById('load-status');
const tooltip = document.getElementById('tooltip');
const detailInfo = document.getElementById('detail-info');
const infoBar = document.getElementById('info-bar');
const albumCountEl = document.getElementById('album-count');

// ── Proxy fetch helper ──────────────────────────────────────────
async function proxyFetch(url) {
    for (const mkProxy of PROXIES) {
        try {
            const resp = await fetch(mkProxy(url), { signal: AbortSignal.timeout(12000) });
            if (!resp.ok) continue;
            const text = await resp.text();
            if (text.length < 100) continue;
            return text;
        } catch { /* try next */ }
    }
    throw new Error('All proxies failed');
}

// ── Art URL builder ─────────────────────────────────────────────
function artUrl(artId) {
    if (!artId) return '';
    return `https://f4.bcbits.com/img/a${artId}_10.jpg`;
}

// ── Parse collection from data-blob ─────────────────────────────
function parseDataBlob(html) {
    const marker = 'data-blob="';
    const start = html.indexOf(marker);
    if (start === -1) return null;

    const jsonStart = start + marker.length;
    let i = jsonStart;
    while (i < html.length && html[i] !== '"') i++;
    const raw = html.substring(jsonStart, i);

    const textarea = document.createElement('textarea');
    textarea.innerHTML = raw;
    const decoded = textarea.value;

    return JSON.parse(decoded);
}

function extractAlbumsFromBlob(blob) {
    const results = [];
    const cache = blob.item_cache?.collection || {};

    for (const [key, it] of Object.entries(cache)) {
        const itemType = it.tralbum_type || (key.startsWith('t') ? 't' : 'a');
        results.push({
            title: it.item_title || 'Untitled',
            artist: it.band_name || 'Unknown',
            artUrl: artUrl(it.item_art_id),
            bandcampUrl: it.item_url || '#',
            tralbumType: itemType,
            tralbumId: it.tralbum_id || it.item_id,
        });
    }

    const seq = blob.collection_data?.sequence || [];
    if (seq.length > 0) {
        const byKey = {};
        for (const [key, it] of Object.entries(cache)) byKey[key] = it;
        const ordered = [];
        const added = new Set();
        for (const key of seq) {
            if (byKey[key]) {
                const it = byKey[key];
                const itemType = it.tralbum_type || (key.startsWith('t') ? 't' : 'a');
                ordered.push({
                    title: it.item_title || 'Untitled',
                    artist: it.band_name || 'Unknown',
                    artUrl: artUrl(it.item_art_id),
                    bandcampUrl: it.item_url || '#',
                    tralbumType: itemType,
                    tralbumId: it.tralbum_id || it.item_id,
                });
                added.add(key);
            }
        }
        for (const r of results) {
            if (!added.has(r.bandcampUrl)) ordered.push(r);
        }
        return ordered.length > 0 ? ordered : results;
    }

    return results;
}

// ── Fetch paginated items via API ───────────────────────────────
async function fetchMoreItems(fanIdVal, token, count = 40) {
    const body = JSON.stringify({
        fan_id: fanIdVal,
        older_than_token: token,
        count
    });

    const apiUrl = 'https://bandcamp.com/api/fancollection/1/collection_items';

    const strategies = [
        async () => {
            const r = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body,
                signal: AbortSignal.timeout(8000)
            });
            return r.json();
        },
        async () => { throw new Error('skip'); }
    ];

    for (const strat of strategies) {
        try {
            const data = await strat();
            if (data.items && data.items.length > 0) return data;
        } catch { /* next */ }
    }

    return null;
}

// ── Main fetch ──────────────────────────────────────────────────
async function fetchCollection() {
    loadStatus.textContent = 'fetching collection...';
    loaderBar.style.width = '15%';

    const html = await proxyFetch(`https://bandcamp.com/${BANDCAMP_USER}`);

    loaderBar.style.width = '35%';
    loadStatus.textContent = 'parsing collection data...';

    let blob;
    try {
        blob = parseDataBlob(html);
    } catch (e) {
        console.error('Failed to parse data-blob:', e);
    }

    if (blob) {
        fanId = blob.fan_data?.fan_id;
        lastToken = blob.collection_data?.last_token;
        totalCount = blob.collection_data?.item_count || 0;
        albums = extractAlbumsFromBlob(blob);
        console.log(`Parsed ${albums.length} albums from initial page (total: ${totalCount})`);
    }

    if (albums.length === 0) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const items = doc.querySelectorAll('li');
        items.forEach(li => {
            const img = li.querySelector('img');
            if (!img) return;
            const src = img.getAttribute('src') || img.getAttribute('data-src') || '';
            if (!src.includes('bcbits')) return;
            const links = li.querySelectorAll('a');
            let bcLink = '', title = '';
            links.forEach(a => {
                const href = a.getAttribute('href') || '';
                if (href.includes('bandcamp.com')) {
                    bcLink = href;
                    if (!title) title = a.textContent.trim();
                }
            });
            const text = li.textContent;
            const byMatch = text.match(/by\s+(.+?)(?:\n|$)/i);
            albums.push({
                title: title || 'Untitled',
                artist: byMatch ? byMatch[1].trim() : 'Unknown',
                artUrl: src.replace(/_\d+\./, '_10.'),
                bandcampUrl: bcLink.startsWith('http') ? bcLink : ('https://' + bcLink),
                tralbumType: null,
                tralbumId: null,
            });
        });
    }

    loaderBar.style.width = '45%';

    if (fanId && lastToken && albums.length < totalCount) {
        loadStatus.textContent = `loading more albums (${albums.length}/${totalCount})...`;
        let token = lastToken;
        let attempts = 0;
        const maxAttempts = 15;
        while (albums.length < totalCount && token && attempts < maxAttempts) {
            attempts++;
            const data = await fetchMoreItems(fanId, token, 100);
            if (!data || !data.items || data.items.length === 0) break;

            for (const it of data.items) {
                albums.push({
                    title: it.item_title || 'Untitled',
                    artist: it.band_name || 'Unknown',
                    artUrl: artUrl(it.item_art_id),
                    bandcampUrl: it.item_url || '#',
                    tralbumType: it.tralbum_type,
                    tralbumId: it.tralbum_id,
                });
            }

            token = data.more_available ? data.last_token : null;
            const pct = 45 + (albums.length / totalCount) * 20;
            loaderBar.style.width = pct + '%';
            loadStatus.textContent = `loading more albums (${albums.length}/${totalCount})...`;
        }
    }

    const seen = new Set();
    albums = albums.filter(a => {
        const key = a.bandcampUrl + a.title;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
    });

    const suffix = totalCount > albums.length ? ` of ${totalCount}` : '';
    albumCountEl.textContent = `${albums.length}${suffix} albums`;
    loaderBar.style.width = '65%';
    loadStatus.textContent = `loaded ${albums.length} albums, building scene...`;
}

// ── Three.js setup ──────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a12, 0.035);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(cameraDefaults.x, cameraDefaults.y, cameraDefaults.z);
camera.lookAt(0, cameraDefaults.lookY, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0a12);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0x665544, 0.8));
const mainLight = new THREE.DirectionalLight(0xffeedd, 0.8);
mainLight.position.set(3, 6, 5);
mainLight.castShadow = true;
scene.add(mainLight);

const neonPink = new THREE.PointLight(0xff00ff, 1.5, 18);
neonPink.position.set(-6, 4, 4);
scene.add(neonPink);

const neonCyan = new THREE.PointLight(0x00ffff, 1.5, 18);
neonCyan.position.set(6, 1, 5);
scene.add(neonCyan);

const underglow = new THREE.PointLight(0xffaa55, 0.3, 8);
underglow.position.set(0, -1, 3);
scene.add(underglow);

// ── Shelf ───────────────────────────────────────────────────────
const shelfGroup = new THREE.Group();
scene.add(shelfGroup);

const textureLoader = new THREE.TextureLoader();
textureLoader.crossOrigin = 'anonymous';

// ── Procedural wood grain texture ───────────────────────────────
function createWoodTexture(width, height) {
    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');

    // Base wood color
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(0, 0, width, height);

    // Wood grain lines
    for (let i = 0; i < 60; i++) {
        const y = Math.random() * height;
        const thickness = 0.5 + Math.random() * 2;
        const alpha = 0.08 + Math.random() * 0.15;
        ctx.strokeStyle = `rgba(30, 15, 5, ${alpha})`;
        ctx.lineWidth = thickness;
        ctx.beginPath();
        ctx.moveTo(0, y);
        // Wavy grain
        for (let x = 0; x < width; x += 4) {
            const wobble = Math.sin(x * 0.02 + i * 0.7) * 3 + Math.sin(x * 0.005 + i) * 6;
            ctx.lineTo(x, y + wobble);
        }
        ctx.stroke();
    }

    // Lighter grain highlights
    for (let i = 0; i < 30; i++) {
        const y = Math.random() * height;
        const alpha = 0.04 + Math.random() * 0.08;
        ctx.strokeStyle = `rgba(140, 100, 50, ${alpha})`;
        ctx.lineWidth = 0.5 + Math.random() * 1.5;
        ctx.beginPath();
        ctx.moveTo(0, y);
        for (let x = 0; x < width; x += 4) {
            const wobble = Math.sin(x * 0.015 + i * 1.3) * 4;
            ctx.lineTo(x, y + wobble);
        }
        ctx.stroke();
    }

    // Occasional knots
    for (let i = 0; i < 3; i++) {
        const kx = Math.random() * width;
        const ky = Math.random() * height;
        const kr = 4 + Math.random() * 8;
        const grad = ctx.createRadialGradient(kx, ky, 0, kx, ky, kr);
        grad.addColorStop(0, 'rgba(35, 18, 5, 0.4)');
        grad.addColorStop(0.5, 'rgba(50, 28, 10, 0.2)');
        grad.addColorStop(1, 'rgba(90, 58, 26, 0)');
        ctx.fillStyle = grad;
        ctx.fillRect(kx - kr, ky - kr, kr * 2, kr * 2);
    }

    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    return tex;
}

const woodTex = createWoodTexture(512, 256);
const woodTexSide = createWoodTexture(256, 512);

const woodMat = new THREE.MeshStandardMaterial({
    map: woodTex,
    roughness: 0.75,
    metalness: 0.05,
    color: 0xccaa77,
});
const woodMatSide = new THREE.MeshStandardMaterial({
    map: woodTexSide,
    roughness: 0.75,
    metalness: 0.05,
    color: 0xccaa77,
});
const woodMatBack = new THREE.MeshStandardMaterial({
    map: createWoodTexture(512, 512),
    roughness: 0.85,
    metalness: 0.02,
    color: 0x997755,
});

function buildShelves(count) {
    const rows = Math.ceil(count / ALBUMS_PER_ROW);
    const totalW = ALBUMS_PER_ROW * (ALBUM_SIZE + ALBUM_GAP) + ALBUM_GAP;

    for (let r = 0; r < rows; r++) {
        const y = r * ROW_HEIGHT;

        // Bottom plank
        const plank = new THREE.Mesh(
            new THREE.BoxGeometry(totalW + 0.5, 0.08, SHELF_DEPTH + 0.3),
            woodMat
        );
        plank.position.set(0, y - 0.04, -SHELF_DEPTH * 0.2);
        plank.receiveShadow = true;
        shelfGroup.add(plank);

        // Back panel (slightly recessed)
        const back = new THREE.Mesh(
            new THREE.BoxGeometry(totalW + 0.5, ROW_HEIGHT - 0.08, 0.05),
            woodMatBack
        );
        back.position.set(0, y + ROW_HEIGHT / 2, -SHELF_DEPTH / 2 - 0.15);
        shelfGroup.add(back);
    }

    // Top plank (cap)
    const topPlank = new THREE.Mesh(
        new THREE.BoxGeometry(totalW + 0.5, 0.08, SHELF_DEPTH + 0.3),
        woodMat
    );
    topPlank.position.set(0, rows * ROW_HEIGHT - 0.04, -SHELF_DEPTH * 0.2);
    shelfGroup.add(topPlank);

    // Side panels
    const h = rows * ROW_HEIGHT + 0.04;
    for (const s of [-1, 1]) {
        const p = new THREE.Mesh(
            new THREE.BoxGeometry(0.08, h, SHELF_DEPTH + 0.3),
            woodMatSide
        );
        p.position.set(s * (totalW / 2 + 0.28), h / 2 - 0.04, -SHELF_DEPTH * 0.2);
        shelfGroup.add(p);
    }
}

// ── Album placeholder texture ───────────────────────────────────
const phCanvas = document.createElement('canvas');
phCanvas.width = 64; phCanvas.height = 64;
const phCtx = phCanvas.getContext('2d');
phCtx.fillStyle = '#1a0a2e'; phCtx.fillRect(0, 0, 64, 64);
phCtx.strokeStyle = '#ff00ff33'; phCtx.lineWidth = 2;
phCtx.strokeRect(6, 6, 52, 52);
const placeholderTex = new THREE.CanvasTexture(phCanvas);

// ── Create one album mesh ───────────────────────────────────────
function createAlbumMesh(album, index) {
    const row = Math.floor(index / ALBUMS_PER_ROW);
    const col = index % ALBUMS_PER_ROW;
    const totalW = ALBUMS_PER_ROW * (ALBUM_SIZE + ALBUM_GAP);
    const x = col * (ALBUM_SIZE + ALBUM_GAP) - totalW / 2 + ALBUM_SIZE / 2 + ALBUM_GAP / 2;
    const y = row * ROW_HEIGHT + ALBUM_SIZE / 2 + 0.08;

    const group = new THREE.Group();
    group.position.set(x, y, 0);

    // Lean the record backward (into the shelf)
    group.rotation.x = -LEAN_ANGLE;

    // Front face with album art
    const frontMat = new THREE.MeshStandardMaterial({
        map: placeholderTex.clone(), roughness: 0.4, metalness: 0.05,
    });
    const front = new THREE.Mesh(new THREE.PlaneGeometry(ALBUM_SIZE, ALBUM_SIZE), frontMat);
    front.position.z = SPINE_WIDTH / 2;
    group.add(front);

    // Back face
    const backMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8, metalness: 0.1 });
    const back = new THREE.Mesh(new THREE.PlaneGeometry(ALBUM_SIZE, ALBUM_SIZE), backMat);
    back.rotation.y = Math.PI;
    back.position.z = -SPINE_WIDTH / 2;
    group.add(back);

    // Spine / edges (box around the record)
    const edgeMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.7, metalness: 0.1 });
    const makeEdge = (w, h, d, px, py) => {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), edgeMat);
        m.position.set(px, py, 0);
        group.add(m);
    };
    makeEdge(ALBUM_SIZE, 0.018, SPINE_WIDTH, 0, ALBUM_SIZE / 2);   // top
    makeEdge(ALBUM_SIZE, 0.018, SPINE_WIDTH, 0, -ALBUM_SIZE / 2);  // bottom
    makeEdge(0.018, ALBUM_SIZE, SPINE_WIDTH, -ALBUM_SIZE / 2, 0);  // left
    makeEdge(0.018, ALBUM_SIZE, SPINE_WIDTH, ALBUM_SIZE / 2, 0);   // right

    group.userData = {
        album, index,
        basePos: group.position.clone(),
        baseRotX: -LEAN_ANGLE,
        targetZ: 0, currentZ: 0,
        targetRotX: -LEAN_ANGLE, currentRotX: -LEAN_ANGLE,
        targetRotY: 0, currentRotY: 0,
        hovered: false,
        selected: false,
    };

    shelfGroup.add(group);
    albumMeshes.push(group);

    // Load art texture
    if (album.artUrl) {
        textureLoader.load(album.artUrl, tex => {
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.minFilter = THREE.LinearFilter;
            tex.magFilter = THREE.LinearFilter;
            frontMat.map = tex;
            frontMat.needsUpdate = true;
        }, undefined, () => {});
    }

    // Add a warm point light between records (every other one)
    if (col % 2 === 0) {
        const lightColor = index % 4 === 0 ? 0xff8844 : index % 4 === 2 ? 0xffcc66 : 0xff6633;
        const recordLight = new THREE.PointLight(lightColor, 0.15, 2.0);
        recordLight.position.set(x + (ALBUM_SIZE + ALBUM_GAP) / 2, y, 0.3);
        shelfGroup.add(recordLight);
    }

    return group;
}

// ── Raycasting ──────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2(-999, -999);

function updatePointer(e) {
    pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
    pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
}

function getHoveredAlbum() {
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(shelfGroup.children, true);
    for (const h of hits) {
        let obj = h.object;
        while (obj.parent && obj.parent !== shelfGroup) obj = obj.parent;
        if (obj.userData?.album) return obj;
    }
    return null;
}

// ── Events ──────────────────────────────────────────────────────
renderer.domElement.addEventListener('pointermove', e => {
    updatePointer(e);
    if (isDragging && !isDetailView) {
        pointerMoved = true;
        const dy = e.clientY - lastPointerY;
        targetScroll -= dy * 0.012;
        lastPointerY = e.clientY;
    }

    if (isDetailView) {
        renderer.domElement.style.cursor = 'default';
        tooltip.style.display = 'none';
        return;
    }

    const hit = getHoveredAlbum();
    if (hoveredMesh && hoveredMesh !== hit) {
        hoveredMesh.userData.hovered = false;
        hoveredMesh.userData.targetZ = 0;
        hoveredMesh.userData.targetRotX = hoveredMesh.userData.baseRotX;
    }
    hoveredMesh = hit;
    if (hit && !isDetailView) {
        hit.userData.hovered = true;
        hit.userData.targetZ = HOVER_PULL;
        hit.userData.targetRotX = -LEAN_ANGLE * 0.3; // straighten up slightly
        renderer.domElement.style.cursor = 'pointer';
        tooltip.style.display = 'block';
        tooltip.style.left = Math.min(e.clientX + 14, window.innerWidth - 290) + 'px';
        tooltip.style.top = e.clientY + 14 + 'px';
        tooltip.querySelector('.tt-title').textContent = hit.userData.album.title;
        tooltip.querySelector('.tt-artist').textContent = hit.userData.album.artist;
    } else {
        renderer.domElement.style.cursor = isDragging ? 'grabbing' : 'default';
        tooltip.style.display = 'none';
    }
});

renderer.domElement.addEventListener('pointerdown', e => {
    if (isDetailView) return;
    isDragging = true;
    pointerMoved = false;
    pointerDownTime = Date.now();
    lastPointerY = e.clientY;
    renderer.domElement.style.cursor = 'grabbing';
});

window.addEventListener('pointerup', e => {
    const elapsed = Date.now() - pointerDownTime;
    if (isDragging && !pointerMoved && elapsed < 300 && !isDetailView) {
        updatePointer(e);
        const hit = getHoveredAlbum();
        if (hit) openDetail(hit);
    }
    isDragging = false;
    if (!isDetailView) renderer.domElement.style.cursor = 'default';
});

renderer.domElement.addEventListener('wheel', e => {
    if (isDetailView) return;
    e.preventDefault();
    targetScroll += e.deltaY * 0.004;
}, { passive: false });

// Touch scroll
renderer.domElement.addEventListener('touchstart', e => {
    if (isDetailView) return;
    if (e.touches.length === 1) {
        isDragging = true;
        pointerMoved = false;
        pointerDownTime = Date.now();
        lastPointerY = e.touches[0].clientY;
    }
}, { passive: true });

renderer.domElement.addEventListener('touchmove', e => {
    if (isDetailView) return;
    if (isDragging && e.touches.length === 1) {
        pointerMoved = true;
        const dy = e.touches[0].clientY - lastPointerY;
        targetScroll -= dy * 0.012;
        lastPointerY = e.touches[0].clientY;
    }
}, { passive: true });

renderer.domElement.addEventListener('touchend', () => {
    isDragging = false;
});

function clampScroll() {
    const rows = Math.ceil(albums.length / ALBUMS_PER_ROW);
    const max = Math.max(0, (rows - 2) * ROW_HEIGHT);
    targetScroll = Math.max(-0.5, Math.min(targetScroll, max));
}

// ── Detail view (bring record to camera) ────────────────────────
function openDetail(mesh) {
    const album = mesh.userData.album;
    selectedAlbum = album;
    selectedMesh = mesh;
    isDetailView = true;

    // Pull the record out fully and straighten it
    mesh.userData.selected = true;
    mesh.userData.targetZ = FULL_PULL;
    mesh.userData.targetRotX = 0; // stand straight
    mesh.userData.targetRotY = 0;

    // Move camera to focus on this record
    const worldPos = new THREE.Vector3();
    mesh.getWorldPosition(worldPos);
    cameraTarget = {
        x: worldPos.x * 0.5,
        y: worldPos.y + shelfGroup.position.y,
        z: worldPos.z + FULL_PULL + 3.0,
        lookY: worldPos.y + shelfGroup.position.y,
    };

    // Show info overlay
    document.getElementById('detail-title').textContent = album.title;
    document.getElementById('detail-artist').textContent = album.artist;
    document.getElementById('detail-link').href = album.bandcampUrl;

    const embedWrap = document.getElementById('detail-embed-wrap');
    let embedSrc = '';

    if (album.tralbumType && album.tralbumId) {
        const typeKey = album.tralbumType === 'a' ? 'album' : 'track';
        embedSrc = `https://bandcamp.com/EmbeddedPlayer/${typeKey}=${album.tralbumId}/size=large/bgcol=0a0a12/linkcol=00ffcc/tracklist=false/artwork=none/transparent=true/`;
    } else if (album.bandcampUrl && album.bandcampUrl !== '#') {
        let url = album.bandcampUrl;
        if (!url.startsWith('http')) url = 'https://' + url;
        embedSrc = `https://bandcamp.com/EmbeddedPlayer/url=${url}/size=large/bgcol=0a0a12/linkcol=00ffcc/tracklist=false/artwork=none/transparent=true/`;
    }

    if (embedSrc) {
        embedWrap.innerHTML = `<iframe src="${embedSrc}" seamless loading="lazy" title="Bandcamp player"></iframe>`;
    } else {
        embedWrap.innerHTML = '<p style="color:#555;font-size:0.85em;">Player unavailable</p>';
    }

    detailInfo.classList.add('active');
    infoBar.classList.add('hidden');
    tooltip.style.display = 'none';
}

function closeDetail() {
    if (selectedMesh) {
        selectedMesh.userData.selected = false;
        selectedMesh.userData.targetZ = 0;
        selectedMesh.userData.targetRotX = selectedMesh.userData.baseRotX;
        selectedMesh.userData.targetRotY = 0;
    }
    selectedAlbum = null;
    selectedMesh = null;
    isDetailView = false;

    // Return camera to default
    cameraTarget = { ...cameraDefaults };

    detailInfo.classList.remove('active');
    infoBar.classList.remove('hidden');
    document.getElementById('detail-embed-wrap').innerHTML = '';
}

document.getElementById('detail-back').addEventListener('click', closeDetail);
window.addEventListener('keydown', e => { if (e.key === 'Escape' && isDetailView) closeDetail(); });

// ── Background particles ────────────────────────────────────────
function createParticles() {
    const n = 150;
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(n * 3);
    for (let i = 0; i < n; i++) {
        pos[i*3] = (Math.random()-0.5)*30;
        pos[i*3+1] = (Math.random()-0.5)*30;
        pos[i*3+2] = (Math.random()-0.5)*15 - 4;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({ color: 0xff44ff, size: 0.025, transparent: true, opacity: 0.25, sizeAttenuation: true });
    const pts = new THREE.Points(geo, mat);
    scene.add(pts);
    return pts;
}
const particles = createParticles();

// Floor grid
const gridMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(40, 40, 40, 40),
    new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.025 })
);
gridMesh.rotation.x = -Math.PI / 2;
gridMesh.position.y = -0.5;
scene.add(gridMesh);

// ── Animate ─────────────────────────────────────────────────────
const clock = new THREE.Clock();
const lookTarget = new THREE.Vector3(0, cameraDefaults.lookY, 0);

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    const t = clock.getElapsedTime();

    // Scroll (only when not in detail view)
    if (!isDetailView) {
        clampScroll();
        scrollOffset += (targetScroll - scrollOffset) * 5 * dt;
        shelfGroup.position.y = -scrollOffset + 0.5;
    }

    // Animate albums
    for (const mesh of albumMeshes) {
        const ud = mesh.userData;
        const speed = 6 * dt;

        ud.currentZ += (ud.targetZ - ud.currentZ) * speed;
        mesh.position.z = ud.basePos.z + ud.currentZ;

        ud.currentRotX += (ud.targetRotX - ud.currentRotX) * speed;
        mesh.rotation.x = ud.currentRotX;

        ud.currentRotY += (ud.targetRotY - ud.currentRotY) * speed;
        mesh.rotation.y = ud.currentRotY;
    }

    // Camera animation
    const camSpeed = 3 * dt;
    const breathY = isDetailView ? 0 : Math.sin(t * 0.4) * 0.04;
    camera.position.x += (cameraTarget.x - camera.position.x) * camSpeed;
    camera.position.y += (cameraTarget.y + breathY - camera.position.y) * camSpeed;
    camera.position.z += (cameraTarget.z - camera.position.z) * camSpeed;

    lookTarget.x += (cameraTarget.x - lookTarget.x) * camSpeed;
    lookTarget.y += (cameraTarget.lookY - lookTarget.y) * camSpeed;
    lookTarget.z = 0;
    camera.lookAt(lookTarget);

    // Subtle light pulsing
    particles.rotation.y = t * 0.015;
    particles.position.y = Math.sin(t * 0.25) * 0.15;
    neonPink.intensity = 1.5 + Math.sin(t * 1.3) * 0.3;
    neonCyan.intensity = 1.5 + Math.cos(t * 1.0) * 0.3;

    renderer.render(scene, camera);
}

// ── Resize ──────────────────────────────────────────────────────
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Init ────────────────────────────────────────────────────────
async function init() {
    try {
        await fetchCollection();
    } catch (err) {
        console.error('Failed to fetch collection:', err);
        loadStatus.textContent = 'failed to load collection - check console';
        return;
    }

    if (albums.length === 0) {
        loadStatus.textContent = 'no albums found';
        return;
    }

    loaderBar.style.width = '75%';
    loadStatus.textContent = 'building shelves...';

    buildShelves(albums.length);

    for (let i = 0; i < albums.length; i++) {
        createAlbumMesh(albums[i], i);
        loaderBar.style.width = (75 + (i / albums.length) * 25) + '%';
    }

    loaderBar.style.width = '100%';
    loadStatus.textContent = 'ready!';

    setTimeout(() => loadingEl.classList.add('hidden'), 400);
    animate();
}

init();
</script>
